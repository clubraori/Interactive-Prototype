kind = "web"
previewPath = "/sticky-mirror/"
title = "Sticky Mirror"
version = "1.0.0"
id = "artifacts/sticky-mirror"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sticky-mirror/" ]
localPort = 25299

[services.development]
run = "pnpm --filter @workspace/sticky-mirror run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sticky-mirror", "run", "build" ]
publicDir = "artifacts/sticky-mirror/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25299"
BASE_PATH = "/sticky-mirror/"
